<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMIT Student Portal - Saylani Welfare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img src="Images/logo.6lrMPvRL.png" alt="SMIT Logo">
            <p>Student Portal</p>
        </div>

        <div class="login-registration-btn">
            <button class="btn active" onclick="openTab('login')">Login</button>
            <button class="btn" onclick="openTab('registration')">Registration</button>
        </div>

        <div id="login" class="content active">
            <h3>Login</h3>
            <p>Kindly provide the Email and password used during SMIT course registration.</p>
            <form onsubmit="userLogin(); return false">
                <div class="input">
                    <label for="useremail">Email *</label>
                    <input type="text" id="loginuseremail" placeholder="Enter Email" required>
                </div>
                <div class="input">
                    <label for="userpassword">Password *</label>
                    <input type="password" id="loginuserpassword" placeholder="Enter Password" required>
                </div>
                <button class="login-btn">LOGIN</button>
            </form>
        </div>

        <div id="registration" class="content">
            <h3>Registration</h3>
            <p>Kindly provide the Email and Password used during SMIT course registration.</p>
            <form onsubmit="userRegistration(); return false">
                <div class="input">
                    <label for="username">Fullname *</label>
                    <input type="text" id="registrationusername" placeholder="Enter Full Name" required>
                </div>
                <div class="input">
                    <label for="useremail">Email *</label>
                    <input type="email" id="registrationuseremail" placeholder="Enter Email" required>
                </div>
                <div class="input">
                    <label for="userpassword">Password *</label>
                    <input type="text" id="registrationuserpassword" placeholder="Enter Password" required>
                </div>
                <p id="strongpasswordregex"></p>
                <button class="registration-btn">REGISTRATION</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
